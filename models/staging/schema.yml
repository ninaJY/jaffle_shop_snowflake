version: 2

models:
  - name: stg_customers
    description: "Cleaned and renamed customer records from raw source data."
    columns:
      - name: customer_id
        description: "Primary key. Unique identifier for each customer."
        data_tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Cleaned and renamed order records from raw source data."
    columns:
      - name: order_id
        description: "Primary key. Unique identifier for each order."
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers."
        data_tests:
          - not_null
      - name: store_id
        description: "Foreign key to stg_stores."
      - name: order_date
        description: "Date the order was placed."
      - name: subtotal
        description: "Order subtotal before tax, in dollars."
      - name: tax_paid
        description: "Tax amount paid on the order."
      - name: order_total
        description: "Total order amount including tax."

  - name: stg_products
    description: "Cleaned and renamed product records from raw source data."
    columns:
      - name: product_id
        description: "Primary key. Unique SKU identifier for each product."
        data_tests:
          - unique
          - not_null
      - name: product_name
        description: "Name of the product."
      - name: price
        description: "Product price in dollars."
      - name: type
        description: "Product type or category."

  - name: stg_stores
    description: "Cleaned and renamed store records from raw source data."
    columns:
      - name: store_id
        description: "Primary key. Unique identifier for each store."
        data_tests:
          - unique
          - not_null
      - name: store_name
        description: "Name of the store."
      - name: opened_at
        description: "Date the store opened."