version: 2

models:
  - name: fct_orders
    description: "Incremental fact table containing one row per order with key metrics. Joins to dim_customers and dim_stores for enrichment."
    meta:
      owner: "nina"
      team: "analytics"
      tier: "gold"
    columns:
      - name: order_id
        description: "Primary key. Unique identifier for each order."
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to dim_customers."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: store_id
        description: "Foreign key to dim_stores."
        data_tests:
          - relationships:
              to: ref('dim_stores')
              field: store_id
      - name: order_date
        description: "Date the order was placed."
      - name: subtotal
        description: "Order subtotal before tax."
      - name: tax_paid
        description: "Tax amount paid."
      - name: order_total
        description: "Total order amount including tax."

  - name: dim_customers
    description: "Customer dimension table containing one row per customer."
    meta:
      owner: "nina"
      team: "analytics"
      tier: "gold"
    columns:
      - name: customer_id
        description: "Primary key. Unique identifier for each customer."
        data_tests:
          - unique
          - not_null
      - name: customer_name
        description: "Full name of the customer."

  - name: dim_products
    description: "Product dimension table containing one row per product."
    meta:
      owner: "nina"
      team: "analytics"
      tier: "gold"
    columns:
      - name: product_id
        description: "Primary key. Unique SKU for each product."
        data_tests:
          - unique
          - not_null
      - name: product_name
        description: "Name of the product."
      - name: price
        description: "Product price in dollars."
      - name: type
        description: "Product type or category."

  - name: dim_stores
    description: "Store dimension table containing one row per store."
    meta:
      owner: "nina"
      team: "analytics"
      tier: "gold"
    columns:
      - name: store_id
        description: "Primary key. Unique identifier for each store."
        data_tests:
          - unique
          - not_null
      - name: store_name
        description: "Name of the store."
      - name: opened_at
        description: "Date the store opened."