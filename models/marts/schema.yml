version: 2

models:
  - name: fct_orders
    description: '{{ doc("fct_orders") }}'
    columns:
      - name: order_id
        description: "Primary key. Unique identifier for each order."
        data_tests:
          - unique:
              config:
                enabled: "{{ target.name == 'prod' }}"
          - not_null:
              config:
                where: "order_date >= dateadd('day', -30, current_date())"
      - name: customer_id
        description: "Foreign key to dim_customers."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
              config:
                where: "customer_id is not null"
      - name: store_id
        description: "Foreign key to dim_stores."
        data_tests:
          - relationships:
              to: ref('dim_stores')
              field: store_id
      - name: order_date
        description: "Date the order was placed."
      - name: subtotal
        description: "Order subtotal before tax."
      - name: tax_paid
        description: "Tax amount paid."
      - name: order_total
        description: "Total order amount including tax."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - customer_id
            - order_date

  - name: dim_customers
    description: "Customer dimension table containing one row per customer."
    columns:
      - name: customer_id
        description: "Primary key. Unique identifier for each customer."
        data_tests:
          - unique:
              config:
                store_failures: true
                store_failures_as: view
          - not_null
      - name: customer_name
        description: "Full name of the customer."
        data_tests:
          - not_empty_string

  - name: dim_products
    description: "Product dimension table containing one row per product."
    columns:
      - name: product_id
        description: "Primary key. Unique SKU for each product."
        data_tests:
          - unique
          - not_null
      - name: product_name
        description: "Name of the product."
      - name: price
        description: "Product price in dollars."
      - name: type
        description: "Product type or category."

  - name: dim_stores
    description: "Store dimension table containing one row per store."
    columns:
      - name: store_id
        description: "Primary key. Unique identifier for each store."
        data_tests:
          - unique
          - not_null
      - name: store_name
        description: "Name of the store."
      - name: opened_at
        description: "Date the store opened."
        
  - name: dim_date
    description: "Independent date dimension table generated via dbt_utils.date_spine, covering 2020-01-01 to 2030-12-31."
    columns:
      - name: date_day
        description: "Primary key. One row per calendar day."
        data_tests:
          - unique
          - not_null